# fm-dev-platform — values.
# Populated per-environment by the operator from the Environment CR.

# Environment-level metadata. Stamped onto every resource.
env:
  name: ""              # e.g. feature-xyz
  owner: ""             # e.g. andrew@fastmarkets.com
  expiresAt: ""         # RFC3339, e.g. 2026-04-30T22:00:00Z

# Shared ingress config. Every env reuses the same hostname; deployments are
# differentiated by path under <pathPrefix>/<env.name>/<deployment>.
# An IngressRoute is emitted automatically for every deployment that sets a port.
ingress:
  host: dev-api-k8s.fastmarkets.com
  pathPrefix: /devenv
  tlsSecretName: ""     # reflected wildcard cert Secret name; hardcode later

# Network policy. Baseline is deny-all; the chart adds the minimum allows the
# bundle needs (DNS, ingress from Traefik). Add further allows here.
networkPolicy:
  traefikNamespace: traefik
  allow:
    # List of namespace names. Pods get bidirectional traffic with these.
    namespaces: []
    # List of CIDRs to allow egress to. Each entry: { cidr: "...", except: ["..."] }
    ipBlocks: []

# One Deployment per map entry. Each is pinned to replicas: 1 by the chart.
# Key becomes the Deployment name (namespace-scoped, no env-name prefix).
deployments: {}
  # api:
  #   image: registry.fastmarkets.io/myapp-api:abc123
  #   imagePullPolicy: IfNotPresent     # optional, default IfNotPresent
  #   port: 8080                        # optional; emits a single named "http" containerPort
  #
  #   resources:
  #     requests: { cpu: 100m, memory: 256Mi }
  #     limits:   { cpu: 500m, memory: 512Mi }
  #
  #   # Workload Identity. When true:
  #   #   - a ServiceAccount is created with name = deployment key
  #   #   - serviceAccountName is set on the pod
  #   #   - automountServiceAccountToken: true (required for the projected token)
  #   #   - pod gets azure.workload.identity/use: "true" label
  #   #   - workloadIdentity.clientId becomes required
  #   # When false (default), no ServiceAccount is emitted and automount is forced off.
  #   usesServiceAccount: false
  #   workloadIdentity:
  #     clientId: "00000000-0000-0000-0000-000000000000"   # required when usesServiceAccount: true
  #
  #   # Probes are off by default. Specify any subset.
  #   probes:
  #     liveness:
  #       httpGet: { path: /healthz, port: 8080 }
  #     readiness:
  #       httpGet: { path: /ready, port: 8080 }
  #     startup:
  #       httpGet: { path: /healthz, port: 8080 }
  #       failureThreshold: 30
  #       periodSeconds: 10
  #
  #   # Container env. Plain values plus secret/configmap refs.
  #   env:
  #     - name: LOG_LEVEL
  #       value: debug
  #     - name: DB_PASSWORD
  #       valueFrom:
  #         secretKeyRef:
  #           name: db-creds          # references a Secret in this namespace
  #           key: password
  #     - name: FEATURE_X
  #       valueFrom:
  #         configMapKeyRef:
  #           name: app-config
  #           key: feature-x
  #
  #   envFrom:
  #     - configMapRef: { name: app-config }
  #     - secretRef:    { name: db-creds }
  #
  #   # Volumes default to none. Use for configmap/secret/projected mounts.
  #   volumes:
  #     - name: config
  #       configMap: { name: app-config }
  #   volumeMounts:
  #     - name: config
  #       mountPath: /etc/config
  #       readOnly: true
  #
  #   # Extra labels merged onto the Deployment + pod template (after platform labels).
  #   labels: {}
  #   podLabels: {}
