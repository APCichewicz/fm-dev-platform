{{- range $name, $cfg := .Values.deployments }}
{{- if $cfg.usesServiceAccount }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    {{- include "fm-dev-platform.commonLabels" (dict "root" $ "deploymentName" $name) | nindent 4 }}
  annotations:
    {{- include "fm-dev-platform.commonAnnotations" (dict "root" $) | nindent 4 }}
    azure.workload.identity/client-id: {{ required (printf "deployments.%s.workloadIdentity.clientId is required when usesServiceAccount is true" $name) (dig "workloadIdentity" "clientId" "" $cfg) | quote }}
automountServiceAccountToken: true
{{- end }}
{{- end }}
