# This rule is not used by the project fm-dev-platform-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to platform.fastmarkets.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: fm-dev-platform-operator
    app.kubernetes.io/managed-by: kustomize
  name: environment-viewer-role
rules:
- apiGroups:
  - platform.fastmarkets.io
  resources:
  - environments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - platform.fastmarkets.io
  resources:
  - environments/status
  verbs:
  - get
