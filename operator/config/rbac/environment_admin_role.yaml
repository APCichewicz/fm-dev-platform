# This rule is not used by the project fm-dev-platform-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over platform.fastmarkets.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: fm-dev-platform-operator
    app.kubernetes.io/managed-by: kustomize
  name: environment-admin-role
rules:
- apiGroups:
  - platform.fastmarkets.io
  resources:
  - environments
  verbs:
  - '*'
- apiGroups:
  - platform.fastmarkets.io
  resources:
  - environments/status
  verbs:
  - get
